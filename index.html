<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#FAF9F6" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#19191A" media="(prefers-color-scheme: dark)">
  <title>Quest — zadania terenowe</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Supabase JS (v2 CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
<div class="app">

  <!-- ═══ HEADER + AUTH ═══ -->
  <header class="app-header">
    <div class="header-left">
      <h1>Quest</h1>
      <span class="subtitle">zadania terenowe</span>
    </div>
    <div class="auth-bar" id="auth-bar">
      <!-- Login form (visible when logged out) -->
      <div class="auth-login-form" id="auth-login-form">
        <input type="email" id="auth-email" class="auth-email-input" placeholder="twój email" autocomplete="email" inputmode="email"
          onkeydown="if(event.key==='Enter')App.handleMagicLink()">
        <button class="auth-btn auth-btn--login" id="auth-send-btn" onclick="App.handleMagicLink()">Wyślij link</button>
        <span class="auth-status" id="auth-status"></span>
      </div>
      <!-- Logged in state (visible when logged in) -->
      <div class="auth-logged-in" id="auth-logged-in" style="display:none">
        <span class="auth-user-name" id="auth-user-name"></span>
        <button class="auth-btn auth-btn--logout" onclick="App.handleLogout()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          <span>Wyloguj</span>
        </button>
      </div>
    </div>
  </header>

  <nav class="nav" id="nav">
    <button class="active" onclick="App.showSection('rand')">Losuj</button>
    <button onclick="App.showSection('cat')">Katalog</button>
    <button onclick="App.showSection('seq')">Sekwencja</button>
    <button onclick="App.showSection('war')">Warszawa</button>
  </nav>

  <div id="loading" class="loading">Wczytywanie zadań…</div>
  <div id="error" class="error-box" style="display:none"></div>

  <!-- ═══════════════════════
       SECTION: Losuj (Draw)
       ═══════════════════════ -->
  <section id="s-rand" class="section draw-section" style="display:none">

    <div class="chips" id="rand-chips"></div>

    <!-- Empty state -->
    <div id="draw-empty" class="draw-empty">
      <div class="draw-empty-text">Wylosuj zadanie terenowe</div>
      <button class="btn-draw" onclick="App.draw()">Losuj</button>
    </div>

    <!-- Card state -->
    <div id="draw-card" style="display:none">
      <div class="hero-card" id="hero-card">
        <div class="hero-meta">
          <span id="hero-badge"></span>
          <span class="hero-title" id="hero-title"></span>
        </div>
        <div class="hero-body" id="hero-body"></div>
        <div class="hero-actions">
          <button class="btn-redraw" onclick="App.draw()">Losuj inne</button>
          <button class="btn-ghost" id="btn-reflect" onclick="App.toggleReflect()" style="display:none">Refleksja</button>
          <button class="btn-ghost" id="btn-note" onclick="App.toggleNote()" style="display:none">Adnotacja</button>
          <button class="btn-ghost" id="btn-entry" onclick="App.toggleEntryForm()" style="display:none">Mój wpis</button>
        </div>
        <div class="expand-zone" id="hero-expand">
          <div class="zone-label">Pytanie refleksyjne</div>
          <div class="zone-text" id="hero-reflect-text"></div>
          <div class="note-block" id="hero-notebox">
            <div class="zone-label">Adnotacja dla prowadzącego</div>
            <div class="zone-text" id="hero-note-text"></div>
          </div>
        </div>
      </div>

      <!-- ═══ ENTRY FORM (below hero card) ═══ -->
      <div class="entry-form" id="entry-form">
        <div class="entry-form-inner">
          <div class="entry-form-head">
            <span class="zone-label">Wpis do zadania:</span>
            <span class="entry-task-label" id="entry-task-label"></span>
          </div>

          <textarea
            id="entry-note"
            class="entry-textarea"
            placeholder="Twoja notatka po wykonaniu zadania…"
            rows="3"
          ></textarea>

          <div class="entry-form-row">
            <label class="entry-photo-label">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
              <span>Zdjęcie</span>
              <input type="file" id="entry-photo" accept="image/*" capture="environment" class="sr-only">
            </label>

            <label class="entry-shared-label">
              <input type="checkbox" id="entry-shared">
              <span>Udostępnij prowadzącemu</span>
            </label>
          </div>

          <div class="entry-form-actions">
            <button class="btn-entry-submit" id="entry-submit" onclick="App.submitEntry()">Zapisz</button>
            <span class="entry-status" id="entry-status"></span>
          </div>

          <!-- Previous entries for this task -->
          <div class="entry-list" id="entry-list"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- ═══════════════════════
       SECTION: Katalog
       ═══════════════════════ -->
  <section id="s-cat" class="section" style="display:none">
    <div class="chips" id="cat-chips"></div>
    <div class="card-grid" id="cat-grid"></div>
  </section>

  <!-- ═══════════════════════
       SECTION: Sekwencja
       ═══════════════════════ -->
  <section id="s-seq" class="section" style="display:none">
    <div class="lvl-nav" id="lvl-nav"></div>
    <div class="lvl-desc" id="lvl-desc"></div>
    <div class="axes" id="lvl-axes"></div>
    <div class="card-grid" id="seq-grid"></div>
  </section>

  <!-- ═══════════════════════
       SECTION: Warszawa
       ═══════════════════════ -->
  <section id="s-war" class="section" style="display:none">
    <div class="war-intro">
      Zadania osadzone w konkretnej tkance Warszawy. Wymagają znajomości miejsca — nie nadają się do innych miast bez modyfikacji.
    </div>
    <div class="card-grid" id="war-grid"></div>
  </section>

</div>

<script src="content/sequence.js"></script>
<script src="js/config.js"></script>
<script src="js/tasks.js"></script>
<script src="js/auth.js"></script>
<script src="js/entries.js"></script>
<script src="js/app.js"></script>
</body>
</html>
